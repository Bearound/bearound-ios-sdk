name: iOS SDK CI

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT: BearoundSDK.xcodeproj
  SCHEME: BearoundSDK
  DERIVED_DATA: DerivedData

jobs:
  build_sdk:
    name: Build SDK
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Xcode LTS
        uses: maxim-lobanov/setup-xcode@v1

      - name: Build SDK for iOS Device
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            | xcpretty

          echo "✅ SDK builds successfully for iOS devices"

      - name: Build SDK for Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            | xcpretty

          echo "✅ SDK builds successfully for iOS Simulator"

  unit_tests:
    name: Unit Tests (non-blocking)
    runs-on: macos-latest
    needs: build_sdk
    timeout-minutes: 30
    # TEMPORARILY NON-BLOCKING. The suite still RUNS here (failures are visible in
    # the logs) but does not gate the merge, because it has PRE-EXISTING failures
    # unrelated to the SDK code: KeychainHelperTests fail because `SecItemAdd`
    # returns false without a signed host/entitlement in the CI simulator, and
    # OfflineBatchStorageTests are order-dependent (they share persisted state).
    # These were never executed before (the old CI used a wrong simulator
    # destination + `xcpretty || true`). Fixing the suite is a tracked follow-up;
    # until then the honest BUILD gates the merge, not these tests.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Xcode LTS
        uses: maxim-lobanov/setup-xcode@v1

      - name: Run unit tests
        run: |
          set -o pipefail
          # Pick the first available iPhone simulator on the runner by UDID — the
          # exact device/OS name varies with the runner's Xcode, so a hardcoded
          # "iPhone 16" fails with "Unable to find a device matching the destination".
          DEVICE_ID=$(xcrun simctl list devices available | grep -m1 "iPhone" \
            | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}')
          if [ -z "$DEVICE_ID" ]; then
            echo "❌ No available iPhone simulator on the runner"; exit 1
          fi
          echo "Using simulator $DEVICE_ID"
          xcodebuild test \
            -project "$PROJECT" \
            -scheme BearoundSDKTests \
            -destination "id=$DEVICE_ID" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

          echo "✅ Unit tests passed"

  pod_lint:
    name: CocoaPods Lint
    runs-on: macos-latest
    needs: build_sdk
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Xcode LTS
        uses: maxim-lobanov/setup-xcode@v1

      - name: Lint podspec
        run: |
          pod lib lint BearoundSDK.podspec \
            --allow-warnings \
            --platforms=ios \
            --skip-import-validation

  build_xcframework:
    name: Build XCFramework
    runs-on: macos-latest
    needs: [build_sdk, pod_lint]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Xcode LTS
        uses: maxim-lobanov/setup-xcode@v1

      - name: Build framework
        run: |
          chmod +x build_framework.sh
          ./build_framework.sh

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: BearoundSDK-xcframework
          path: build/BearoundSDK.xcframework

  ci_success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build_sdk, unit_tests, pod_lint, build_xcframework]
    if: always()

    steps:
      # Unit Tests are intentionally NOT in this gate (see the unit_tests job):
      # they run for visibility but are temporarily non-blocking due to
      # pre-existing suite failures. The build/lint/xcframework jobs gate the merge.
      - name: Check all jobs status
        if: |
          needs.build_sdk.result != 'success' ||
          needs.pod_lint.result != 'success' ||
          needs.build_xcframework.result != 'success'
        run: |
          echo "❌ One or more CI jobs failed:"
          echo "Build SDK: ${{ needs.build_sdk.result }}"
          echo "Pod Lint: ${{ needs.pod_lint.result }}"
          echo "Build XCFramework: ${{ needs.build_xcframework.result }}"
          exit 1

      - name: Unit test status (informational)
        run: |
          echo "Unit Tests (non-blocking): ${{ needs.unit_tests.result }}"

      - name: All checks passed
        run: |
          echo "✅ All CI checks passed successfully!"
          echo "🚀 Ready for merge/deployment"
